{% extends "layout.html" %}
{% block content %}
  <h3>文件列表</h3>
  <form class="mb-3" method="get">
    <div class="input-group">
      <input class="form-control" name="q" value="{{ q }}" placeholder="按文件名或内容搜索">
      <button class="btn btn-outline-secondary" type="submit">搜索</button>
    </div>
  </form>

  <form method="post" action="/delete">
    <table class="table table-sm">
      <thead>
        <tr><th></th><th>文件名</th><th>大小</th></tr>
      </thead>
      <tbody>
        {% for f in uploads %}
          <tr>
            <td><input type="checkbox" name="files" value="{{ f.name }}"></td>
            <td><a href="/preview?file={{ f.name }}">{{ f.name }}</a></td>
            <td>{{ f.size_kb }}</td>
          </tr>
        {% else %}
          <tr><td colspan="3">暂无文件</td></tr>
        {% endfor %}
      </tbody>
    </table>
    <button class="btn btn-danger" type="submit">删除选中</button>
  </form>

  <nav aria-label="pagination">
    <ul class="pagination mt-3">
      {% for p in range(1, total_pages+1) %}
        <li class="page-item {% if p==page %}active{% endif %}"><a class="page-link" href="?page={{ p }}&q={{ q }}">{{ p }}</a></li>
      {% endfor %}
    </ul>
  </nav>
{% endblock %}
