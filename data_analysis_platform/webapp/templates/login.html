<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8">
    <title>登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0EVHe/X+R7Yk3r2D1aE6y7FMOj0/7v5xR1+2G1aPTl7IQNeK2c9Ew4Zf+v5K3y6U" crossorigin="anonymous">
  </head>
  <body>
    <div class="container mt-5" style="max-width: 500px;">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h2 class="card-title mb-0">登录</h2>
        </div>
        <div class="card-body">
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert alert-warning" role="alert">
                {% for message in messages %}
                  <div>{{ message }}</div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}
          <form method="post">
            <div class="mb-3">
              <label class="form-label">用户名</label>
              <input name="username" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input name="password" type="password" class="form-control">
            </div>
            <div>
              <button type="submit" class="btn btn-primary">登录</button>
              <a href="/" class="btn btn-link">返回首页</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
