<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8">
    <title>会话历史</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0EVHe/X+R7Yk3r2D1aE6y7FMOj0/7v5xR1+2G1aPTl7IQNeK2c9Ew4Zf+v5K3y6U" crossorigin="anonymous">
  </head>
  <body>
    <div class="container mt-5 mb-5" style="max-width: 1000px;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>会话历史</h2>
        <a href="/" class="btn btn-link">返回上传页面</a>
      </div>
      <div class="card shadow-sm">
        <div class="card-body">
          {% if sessions %}
            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>时间</th>
                    <th>用户</th>
                    <th>数据集</th>
                    <th>分析类型</th>
                    <th>预览结果</th>
                  </tr>
                </thead>
                <tbody>
                  {% for session in sessions[::-1] %}
                  <tr>
                    <td>{{ session.timestamp }}</td>
                    <td>{{ session.user or '匿名' }}</td>
                    <td>{{ session.dataset }}</td>
                    <td>{{ session.query }}</td>
                    <td style="max-width: 480px; white-space: pre-wrap; word-break: break-word;">{{ session.result_preview }}</td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          {% else %}
            <p>当前暂无分析历史。</p>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
