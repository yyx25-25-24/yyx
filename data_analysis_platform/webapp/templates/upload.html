<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8">
    <title>数据分析平台 - 上传</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0EVHe/X+R7Yk3r2D1aE6y7FMOj0/7v5xR1+2G1aPTl7IQNeK2c9Ew4Zf+v5K3y6U" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
      body {
        font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f4f7fc;
        color: #242424;
      }
      .container {
        margin-left: auto;
        margin-right: auto;
        padding-top: 24px;
      }
      .card {
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 1rem;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      .card-header {
        background: #ffffff;
      }
      .form-label {
        font-weight: 600;
      }
      .form-control,
      .form-select,
      .input-group-text {
        border: 1px solid #d1d5db;
        border-radius: 0.6rem;
        padding: 0.75rem 0.85rem;
      }
      .btn {
        border-radius: 0.65rem;
        padding: 0.75rem 1.2rem;
      }
      .btn-primary {
        background: #0d6efd;
        border-color: #0d6efd;
      }
      .btn-link {
        color: #0d6efd;
      }
      .card:hover {
        transform: translateY(-2px);
        transition: transform .2s ease, box-shadow .2s ease;
      }
      #submitBtn {
        transition: transform .15s ease;
      }
      #submitBtn:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <div class="container mt-5 mb-5" style="max-width: 800px;">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h2 class="card-title mb-0">上传数据并配置分析 <span class="badge bg-primary ms-2">新 UI</span></h2>
        </div>
        <div class="card-body">
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert alert-warning" role="alert">
                {% for message in messages %}
                  <div>{{ message }}</div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}
          <form id="uploadForm" action="/analyze" method="post" enctype="multipart/form-data">
            <div class="mb-3">
              <label class="form-label">选择文件（CSV / Excel）</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-file-earmark-arrow-up"></i></span>
                <input id="fileInput" type="file" name="file" class="form-control" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">分析类型</label>
              <select name="analysis_type" class="form-select">
                <option>总体分析</option>
                <option>趋势</option>
                <option>相关性</option>
                <option>排名</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">图表类型</label>
              <select name="chart_type" class="form-select">
                <option value="line">折线</option>
                <option value="bar">柱状</option>
                <option value="scatter">散点</option>
                <option value="box">箱型</option>
                <option value="heatmap">热力</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">横轴列名</label>
              <select name="x_col" id="x_col" class="form-select"><option value="">（自动）</option></select>
            </div>
            <div class="mb-3">
              <label class="form-label">纵轴列名</label>
              <select name="y_col" id="y_col" class="form-select"><option value="">（自动）</option></select>
            </div>
            <div class="mb-3">
              <label class="form-label">色系（可选，Plotly 名称或留空）</label>
              <input name="color_scheme" class="form-control" placeholder="例如 Viridis、Cividis">
            </div>
            <div class="mb-3">
              <label class="form-label">输出格式</label>
              <select name="format" class="form-select">
                <option>png</option>
                <option>svg</option>
                <option>html</option>
              </select>
            </div>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">宽度(px)</label>
                <input name="width" value="800" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">高度(px)</label>
                <input name="height" value="600" class="form-control">
              </div>
            </div>
            <div>
              <button type="submit" class="btn btn-primary" id="submitBtn">
                <span class="spinner-border spinner-border-sm me-2 d-none" id="submitSpinner" role="status" aria-hidden="true"></span>
                <i class="bi bi-play-fill me-1"></i> 提交分析
              </button>
              <a href="/history" class="btn btn-link ms-2"><i class="bi bi-clock-history me-1"></i>查看会话历史</a>
            </div>
          </form>
        </div>
      </div>
      <div class="card mt-4 shadow-sm">
        <div class="card-header bg-white">
          <h5 class="card-title mb-0"><i class="bi bi-info-circle me-2"></i>文件信息</h5>
        </div>
        <div class="card-body">
          <p class="text-muted mb-3">请选择文件后，系统会自动读取列名与类型。</p>
          <div id="columnTypes"></div>
          <div id="previewTable"></div>
        </div>
      </div>
    </div>
    <script>
      const fileInput = document.getElementById('fileInput');
      const xCol = document.getElementById('x_col');
      const yCol = document.getElementById('y_col');
      const columnTypes = document.getElementById('columnTypes');
      const previewTable = document.getElementById('previewTable');
      const submitForm = document.getElementById('uploadForm');
      const submitBtn = document.getElementById('submitBtn');
      const submitSpinner = document.getElementById('submitSpinner');

      submitForm.addEventListener('submit', () => {
        submitSpinner.classList.remove('d-none');
        submitBtn.setAttribute('disabled', 'disabled');
      });

      fileInput.addEventListener('change', async (ev) => {
        const f = ev.target.files[0];
        if (!f) return;
        const fd = new FormData();
        fd.append('file', f);
        try {
          const res = await fetch('/columns', { method: 'POST', body: fd });
          const data = await res.json();
          if (data.error) {
            alert('读取列失败: ' + data.error);
            return;
          }
          xCol.innerHTML = '<option value="">（自动）</option>';
          yCol.innerHTML = '<option value="">（自动）</option>';
          data.columns.forEach(c => {
            const opt1 = document.createElement('option'); opt1.value = c; opt1.text = c; xCol.appendChild(opt1);
            const opt2 = document.createElement('option'); opt2.value = c; opt2.text = c; yCol.appendChild(opt2);
          });
          if (data.numeric && data.numeric.length > 0) {
            yCol.value = data.numeric[0];
          }
          if (data.columns.length > 0) {
            xCol.value = data.columns[0];
          }
          columnTypes.innerHTML = '<h5>列类型</h5>' + data.columns.map(c => `<div><strong>${c}</strong>: ${data.dtypes[c]}</div>`).join('');
          if (data.preview && data.preview.length) {
            const headers = data.columns;
            const rows = data.preview;
            let html = '<h5 class="mt-3">前几行预览</h5><div class="table-responsive"><table class="table table-bordered table-sm"><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
            rows.forEach(row => {
              html += '<tr>' + headers.map(h => `<td>${row[h] ?? ''}</td>`).join('') + '</tr>';
            });
            html += '</tbody></table></div>';
            previewTable.innerHTML = html;
          }
        } catch (e) {
          console.error(e);
          alert('获取列信息失败');
        }
      });
    </script>
  </body>
</html>
